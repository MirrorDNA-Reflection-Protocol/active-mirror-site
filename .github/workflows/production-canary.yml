name: Production Canary

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/production-canary.mjs
