name: Public Boundary

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: active-mirror-public-boundary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  public-boundary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Canonical deploy guard
        run: npm run guard:canonical

      - name: Public deploy boundary guard
        run: npm run guard:public-deploy-boundary

      - name: Public copy audit
        run: npm run copy:audit
