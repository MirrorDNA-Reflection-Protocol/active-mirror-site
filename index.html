<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Bring one thing you are stuck on. Active Mirror reflects it into a better question, one next move, and memory you control."
    />
    <link rel="canonical" href="https://activemirror.ai/app/index.html" />
    <title>Active Mirror - start with one thing</title>
    <style>
      :root {
        color-scheme: dark;
        background: #000;
        color: #fff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at center, rgba(124, 58, 237, 0.18), transparent 42%),
          #000;
      }

      a {
        color: #c4b5fd;
      }
    </style>
    <script>
      const target = window.location.hostname === "id.activemirror.ai"
        ? "/app/start/"
        : "/app/";
      window.location.replace(target);
    </script>
  </head>
  <body>
    <main>
      <p>Opening Active Mirror. <a href="/app/">Continue</a></p>
    </main>
  </body>
</html>
