<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Active Mirror</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --verify:#0A6B42; --ink:#0b1220; --muted:#5b6675; --faint:#9aa6b6;
    --line:#e7ecf3; --paper:#fafbfd; --card:#ffffff; --you:#0b1220;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:'Space Grotesk',system-ui,sans-serif;background:var(--paper);color:var(--ink);display:flex;flex-direction:column;height:100dvh}
  header{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;background:#fff}
  .mark{width:22px;height:22px}
  .mark path{fill:none;stroke:var(--verify);stroke-width:1.6}
  header b{font-weight:600;letter-spacing:-.01em}
  header span{color:var(--muted);font-size:.82rem;margin-left:2px}
  main{flex:1;overflow:auto}
  #thread{max-width:720px;margin:0 auto;padding:26px 18px 8px}
  .turn{margin:22px 0;display:flex;flex-direction:column;animation:rise .4s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .you{align-items:flex-end}
  .you .bubble{background:var(--you);color:#fff;padding:11px 15px;border-radius:16px 16px 4px 16px;max-width:80%;line-height:1.45}
  .mirror .reflection{font-size:1.08rem;line-height:1.55;letter-spacing:-.005em;max-width:92%}
  /* the relevant visual: the reframe, drawn as a pivot */
  .reframe{margin:16px 0 4px;border:1px solid var(--line);background:var(--card);border-radius:14px;padding:14px 16px;display:flex;gap:14px;align-items:center;box-shadow:0 1px 0 rgba(11,18,32,.03)}
  .reframe svg{flex:0 0 64px}
  .reframe .rf-text{min-width:0}
  .rf-asked{font-size:.74rem;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
  .rf-asked s{text-decoration-color:var(--line)}
  .rf-real{font-size:1rem;font-weight:600;line-height:1.4;color:var(--ink)}
  .move{margin-top:10px;display:flex;gap:10px;align-items:flex-start;background:rgba(10,107,66,.06);border:1px solid rgba(10,107,66,.18);border-radius:12px;padding:11px 14px}
  .move .dot{flex:0 0 8px;height:8px;width:8px;border-radius:50%;background:var(--verify);margin-top:7px}
  .move .mv{font-size:.95rem;line-height:1.45}
  .move .lbl{font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--verify);font-weight:600;display:block;margin-bottom:2px}
  .trust{margin-top:10px;font-size:.72rem;color:var(--faint);font-family:'JetBrains Mono',monospace}
  .thinking{color:var(--muted);font-style:italic}
  .dots::after{content:'';animation:dots 1.2s steps(4,end) infinite}
  @keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
  footer{border-top:1px solid var(--line);background:#fff;padding:12px}
  form{max-width:720px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
  textarea{flex:1;resize:none;border:1px solid var(--line);border-radius:14px;padding:12px 14px;font:inherit;font-size:1rem;line-height:1.4;max-height:140px;outline:none}
  textarea:focus{border-color:var(--verify)}
  button{flex:0 0 auto;border:none;background:var(--ink);color:#fff;width:44px;height:44px;border-radius:12px;font-size:1.2rem;cursor:pointer;transition:transform .1s}
  button:active{transform:scale(.94)} button:disabled{opacity:.4;cursor:default}
  .hint{max-width:720px;margin:6px auto 0;font-size:.7rem;color:var(--faint);text-align:center}
</style>
</head>
<body>
  <header>
    <svg class="mark" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.4 19.5 7.7v8.6L12 20.6 4.5 16.3V7.7L12 3.4Z"/><path d="M12 7.8 16 10v4l-4 2.2L8 14v-4l4-2.2Z"/></svg>
    <b>Active Mirror</b><span>tells you what you need to hear</span>
  </header>
  <main><div id="thread">
    <div class="turn mirror"><div class="reflection">Bring one thing you're actually stuck on. I won't tell you what you want to hear — I'll hand you back the real question.</div></div>
  </div></main>
  <footer>
    <form id="composer">
      <textarea id="input" rows="1" placeholder="What's one thing you're stuck on?" maxlength="1000"></textarea>
      <button id="send" type="submit" aria-label="Send">&#8593;</button>
    </form>
    <div class="hint">One sentence is enough. Nothing is saved.</div>
  </footer>

<script>
const GATEWAY = "https://gateway.activemirror.ai/v1/mirror/create";
const thread = document.getElementById("thread");
const input = document.getElementById("input");
const form = document.getElementById("composer");
const send = document.getElementById("send");
let turn = 0;

input.addEventListener("input", () => { input.style.height="auto"; input.style.height=Math.min(input.scrollHeight,140)+"px"; });

function esc(s){const d=document.createElement("div");d.textContent=s==null?"":String(s);return d.innerHTML;}
function add(html, cls){const el=document.createElement("div");el.className="turn "+cls;el.innerHTML=html;thread.appendChild(el);el.scrollIntoView({behavior:"smooth",block:"end"});return el;}

// the "relevant visual": a pivot from what they asked to the real question
function reframeSVG(){return `<svg width="64" height="48" viewBox="0 0 64 48" fill="none" aria-hidden="true">
  <circle cx="12" cy="24" r="6" fill="none" stroke="#cdd6e2" stroke-width="1.6"/>
  <path d="M21 24 H43" stroke="#0A6B42" stroke-width="1.6" stroke-dasharray="2 3"/>
  <path d="M40 20 L45 24 L40 28" fill="none" stroke="#0A6B42" stroke-width="1.6"/>
  <circle cx="52" cy="24" r="7.5" fill="rgba(10,107,66,.10)" stroke="#0A6B42" stroke-width="1.6"/>
</svg>`;}

async function ask(text){
  add(`<div class="bubble">${esc(text)}</div>`, "you");
  const pending = add(`<div class="reflection thinking">reflecting<span class="dots"></span></div>`, "mirror");
  send.disabled = true;
  try{
    turn += 1;
    const r = await fetch(GATEWAY,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({intent:text,boundary:"personal",route:"reflection",turn})});
    const d = await r.json();
    if(!d.ok){
      pending.innerHTML = `<div class="reflection">I held this one back — it looked like it carried a secret, so nothing was sent to a model.</div>`;
      return;
    }
    const m = d.mirror||{};
    pending.innerHTML =
      `<div class="reflection">${esc(m.reflection)}</div>`+
      `<div class="reframe">${reframeSVG()}<div class="rf-text">`+
        `<div class="rf-asked"><s>${esc(text.length>52?text.slice(0,52)+"…":text)}</s></div>`+
        `<div class="rf-real">${esc(m.question)}</div>`+
      `</div></div>`+
      `<div class="move"><div class="dot"></div><div class="mv"><span class="lbl">One thing</span>${esc(m.move)}</div></div>`+
      `<div class="trust">reflected from your words only · ${esc((m.receipt&&m.receipt.context_excluded)||"private context kept out")}</div>`;
  }catch(e){
    pending.innerHTML = `<div class="reflection">Couldn't reach the mirror just now. Try again in a moment.</div>`;
  }finally{
    send.disabled = false; input.focus();
  }
}

form.addEventListener("submit",(e)=>{e.preventDefault();const t=input.value.trim();if(t.length<12){input.focus();return;}input.value="";input.style.height="auto";ask(t);});
input.addEventListener("keydown",(e)=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();form.requestSubmit();}});
input.focus();
</script>
</body>
</html>
